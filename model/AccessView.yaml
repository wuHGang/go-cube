cube:
  name: AccessView
  sql_table: default.access

  dimensions:
    id:
      sql: id
      type: string
      primary_key: true
      title: ID

    ts:
      sql: ts
      type: time
      title: 时间

    tsMs:
      sql: ts_ms
      type: number
      title: 时间戳

    nameGroup:
      sql: dictGet('default.name_group_dict', 'groups', ip)
      type: string
      title: 名单分组

    sid:
      sql: sid
      type: string
      title: 设备ID

    uid:
      sql: uid
      type: string
      title: 用户标识

    ip:
      sql: ip
      type: string
      title: IP

    ipGeoCity:
      sql: ip_geo[3]
      type: string
      title: 城市

    ipGeoProvince:
      sql: ip_geo[2]
      type: string
      title: 省份

    ipGeoCountry:
      sql: ip_geo[1]
      type: string
      title: 国家

    ipWithGeo:
      sql: If(length(multiIf(length(ip_geo)=0, '', ip_geo[1]<>'中国', ip_geo[1], ip_geo[3]<>'' and ip_geo[2]<>ip_geo[3], format('{0}{1}', ip_geo[2], ip_geo[3]), ip_geo[2]<>'', ip_geo[2], ip_geo[1]))=0, ip, format('{0}({1})', ip, multiIf(length(ip_geo)=0, '', ip_geo[1]<>'中国', ip_geo[1], ip_geo[3]<>'' and ip_geo[2]<>ip_geo[3], format('{0}{1}', ip_geo[2], ip_geo[3]), ip_geo[2]<>'', ip_geo[2], ip_geo[1])))
      type: string
      title: IP(位置)

    resultRisk:
      sql: arrayFilter(x -> dictGetInt64('default.risk_dict','score',x)!=0,req_risk)
      type: string
      title: 命中规则

    resultType:
      sql: if(result='protect', '保护', '放行')
      type: string
      title: 处理结果

    resultAction:
      sql: result_action
      type: string
      title: 防护动作

    reason:
      sql: reason
      type: string
      title: 原因

    channel:
      sql: channel
      type: string
      title: 应用

    host:
      sql: host
      type: string
      title: 域名

    method:
      sql: method
      type: string
      title: 请求方式

    url:
      sql: url
      type: string
      title: URL

    urlRoute:
      sql: multiIf(url_route != '', url_route, countSubstrings(url, '/') < 2, url, arrayStringConcat(arrayMap(x -> if(countMatches(x, '[0-9a-fA-F-]') > 0.8 * length(x), '{parameter}', x), splitByChar('/', url)), '/'))
      type: string
      title: URL路由

    status:
      sql: status
      type: string
      title: 响应状态

    uaName:
      sql: multiIf(visitParamHas(dev_data, 'AndroidDeviceInfo'),JSONExtractString(dev_data,'AndroidDeviceInfo','OsInfo',3), visitParamHas(dev_data, 'IOSDeviceInfo'),JSONExtractString(dev_data,'IOSDeviceInfo','HwMachine'), visitParamHas(dev_data,'HarmonyDeviceInfo'), JSONExtractString(dev_data, 'HarmonyDeviceInfo', 'OsInfo', 1), ua_info[2])
      type: string
      title: 终端

    uaOs:
      sql: ua_info[5]
      type: string
      title: 操作系统

    uaOsVersion:
      sql: ua_info[6]
      type: string
      title: 系统版本

    deviceFingerprint:
      sql: ext_id[5]
      type: string
      title: 设备指纹

    nodeIp:
      sql: data[1]
      type: string
      title: 节点IP

    nodeName:
      sql: data[2]
      type: string
      title: 节点名字

    reqAction:
      sql: req_action
      type: string
      title: 动作

    reqReason:
      sql: req_reason
      type: string
      title: 原因

    protocol:
      sql: multiIf(simpleJSONHas(req, 'authority'), 'HTTP2', position(method,'|')>0, substringIndex(method,'|',1), 'HTTP')
      type: string
      title: 协议

    reqSensKV:
      sql: if(empty(req_sens_k), '', toJSONString(mapFromArrays(arrayDistinct(req_sens_k), arrayMap(k -> arrayStringConcat(arrayMap(kv -> kv.2, arrayFilter(kv -> kv.1 = k, arrayZip(req_sens_k, req_sens_v))), ','), arrayDistinct(req_sens_k)))))
      type: string
      title: 请求敏感数据

    # 关联展开搜索
    reqSensKey:
      sql: req_sens_k
      type: array
      title: 敏感数据名称(请求)

    reqSensKeyExt:
      sql: arrayJoin(req_sens_k)
      type: string
      title: 敏感数据名称(请求)

    respSensKey:
      sql: res_sens_k
      type: array
      title: 敏感数据名称(响应)

    respSensKeyExt:
      sql: arrayJoin(res_sens_k)
      type: string
      title: 敏感数据名称(响应)

    category:
      sql: "splitByChar(':', arrayJoin(splitByChar(';', assumeNotNull(dictGetString('default.privacy_dict', 'level', arrayJoin(res_sens_k))))))[2]"
      type: string
      title: 规范类别

    grade:
      sql: "splitByChar(':', arrayJoin(splitByChar(';', assumeNotNull(dictGetString('default.privacy_dict', 'level', arrayJoin(res_sens_k))))))[3]"
      type: string
      title: 规范分级

    reqSensVal:
      sql: req_sens_v
      type: array
      title: 敏感数据值(请求)

    respSensVal:
      sql: res_sens_v
      type: array
      title: 敏感数据值(响应)

    reqSensKeyNum:
      sql: arrayReduce('sumMap', arrayMap(x -> map(x, 1), req_sens_k))
      type: string
      title: 统计隐私数量(请求)

    resSensKeyNum:
      sql: arrayReduce('sumMap', arrayMap(x -> map(x, 1), res_sens_k))
      type: string
      title: 统计隐私数量(响应)

    reqContentLength:
      sql: metric[3]
      type: number
      title: 请求大小

    responseRisk:
      sql: arrayFilter(x -> dictGetInt64('default.risk_dict','score',x)!=0,res_risk)
      type: array
      title: 响应风险

    responseAction:
      sql: res_action
      type: string
      title: 响应防护动作

    responseReason:
      sql: res_reason
      type: string
      title: 响应原因

    respContentLength:
      sql: metric[4]
      type: number
      title: 响应大小

    request:
      sql: jsonMergePatch(req, toJSONString(map('Body', if(substr(JSONExtractString(req,'Method'),-3) IN ['C2S','S2C','TCP','WS'], tryBase64Decode(JSONExtractString(req,'Body')), subStr(JSONExtractString(req,'Body'),1,100000)))))
      type: string
      title: 请求报文

    response:
      sql: jsonMergePatch(res, toJSONString(map('Body', subStr(JSONExtractString(res, 'Body'), 1, 100000))))
      type: string
      title: 响应报文

    fileName:
      sql: JSONExtractString(file, 'name')
      type: string
      title: 文件名称

    fileType:
      sql: JSONExtractString(file, 'type')
      type: string
      title: 文件类型

    fileDirection:
      sql: if(notEmpty(file), if(JSONExtractString(file, 'name')!='', '下载', '上传'), '')
      type: string
      title: 动作

    fileMd5:
      sql: if(JSONExtractString(file, 'name') != '', JSONExtractString(file, 'md5'), JSONExtractString(file,1,'md5'))
      type: string
      title: 文件MD5

    fileSha1:
      sql: if(JSONExtractString(file, 'name') != '', JSONExtractString(file, 'sha1'), JSONExtractString(file,1,'sha1'))
      type: string
      title: 文件SHA1

    fileCategory:
      sql: multiIf((if(notEmpty(file), if(JSONExtractString(file, 'name')!='', '下载', '上传'), '')='下载' and notEmpty(res_sens_k)) or (if(notEmpty(file), if(JSONExtractString(file, 'name')!='', '下载', '上传'), '')='上传' and notEmpty(req_sens_k)), '隐私文件', if(JSONExtractString(file, 'name') != '', JSONExtractString(file, 'encrypt'), JSONExtractString(file,1,'encrypt')) = 'true', '加密文件', '普通文件')
      type: string
      title: 文件分类

    fileSensKey:
      sql: if(JSONExtractString(file, 'name') != '', res_sens_k, req_sens_k)
      type: array
      title: 文件敏感数据Key

    fileSensVal:
      sql: if(JSONExtractString(file, 'name') != '', res_sens_v, req_sens_v)
      type: array
      title: 文件敏感数据值

    fileSensKeyExt:
      sql: if(JSONExtractString(file, 'name') != '', arrayJoin(res_sens_k), arrayJoin(req_sens_k))
      type: string
      title: 文件敏感数据Key展开

    fileSensValExt:
      sql: if(JSONExtractString(file, 'name') != '', arrayJoin(res_sens_v), arrayJoin(req_sens_v))
      type: string
      title: 文件敏感数据值展开

    fileSampleKey:
      sql: arraySlice(if(JSONExtractString(file, 'name') != '', res_sens_k, req_sens_k), 1, 1000)
      type: string
      title: 文件隐私名称采样

    fileSampleVal:
      sql: arraySlice(if(JSONExtractString(file, 'name') != '', res_sens_v, req_sens_v), 1, 1000)
      type: string
      title: 文件隐私采样

    fileSensKeyNum:
      sql: toJSONString(arrayReduce('sumMap', arrayMap(x -> map(x, 1), if(JSONExtractString(file, 'name') != '', res_sens_k, req_sens_k))))
      type: string
      title: 文件敏感数据统计

    resultScore:
      sql: multiIf(arrayExists(x -> dictGetInt64('default.risk_dict', 'score', x) = -100, req_risk), -100, notEmpty(req_risk), 100 - (100 * arrayProduct(arrayMap(x -> 1 - dictGetInt64('default.risk_dict', 'score', x) * 0.01, req_risk))), 0)
      type: number
      title: 结果得分

    result:
      sql: result
      type: string
      title: 结果

    assetName:
      sql: url_action[3]
      type: string
      title: 业务

    ua:
      sql: ua
      type: string
      title: User-Agent

    customAppName:
      sql: dictGetString('default.custom_app_dict', 'name', ext_id[7])
      type: string
      title: 应用名字

    topoNetwork:
      sql: if(notEmpty(url_action[5]), url_action[5], multiIf(ip_geo[5]='外发', '下载', ip_geo[1] IN ['内网','局域网'], '内网', '公网'))
      type: string
      title: 网络类型

    dstNode:
      sql: if(position(upstream, ']')!=0, regexpExtract(upstream, '\\[(.*)\\]', 1), splitByChar(':',upstream)[1])
      type: string
      title: 目标节点地址

    upstream:
      sql: upstream
      type: string
      title: 上游服务器

    remoteAddr:
      sql: data[3]
      type: string
      title: 远程地址

    xff:
      sql: xff
      type: string
      title: X-Forwarded-For

    customParamMap:
      sql: mapFromArrays(key,data)
      type: string
      title: 自定义参数

    sensScore:
      sql: if(notEmpty(res_sens_k),100-100*arrayProduct(arrayMap(x -> 1-0.01*dictGetInt64('default.privacy_dict','score',x),arrayDistinct(res_sens_k))),0)
      type: number
      title: 敏感得分

    resSensKV:
      sql: if(empty(res_sens_k), '', toJSONString(mapFromArrays(arrayDistinct(res_sens_k), arrayMap(k -> arrayStringConcat(arrayMap(kv -> kv.2, arrayFilter(kv -> kv.1 = k, arrayZip(res_sens_k, res_sens_v))), ','), arrayDistinct(res_sens_k)))))
      type: string
      title: 响应敏感数据

    dbType:
      sql: if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')
      type: string
      title: 数据库类型

    dbName:
      sql: if(notEmpty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), splitByChar('.', splitByChar('/', url)[3])[-2], '')
      type: string
      title: 数据库名

    tableName:
      sql: if(notEmpty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), splitByChar('.', splitByChar('/', url)[3])[-1], '')
      type: string
      title: 表名

    dbInfo:
      sql: if(notEmpty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), format('{0}.{1}({2})', if(notEmpty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), splitByChar('.', splitByChar('/', url)[3])[-2], ''), if(notEmpty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), splitByChar('.', splitByChar('/', url)[3])[-1], ''), if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')), '')
      type: string
      title: 数据库信息

    dbSensKV:
      sql: if(empty(if(splitByChar('|', method)[1] IN ('MYSQL', 'POSTGRESQL', 'ORACLE'), splitByChar('|', method)[1], '')) OR empty(res_sens_k), '', toJSONString(mapFromArrays(arrayDistinct(res_sens_k), arrayMap(k -> arrayStringConcat(arrayMap(kv -> kv.2, arrayFilter(kv -> kv.1 = k, arrayZip(res_sens_k, res_sens_v))), ','), arrayDistinct(res_sens_k)))))
      type: string
      title: 数据库敏感数据

    # --- filter 专用字段（数组类型，用 has/hasAny 过滤）---
    riskFilterTag:
      sql: arrayConcat(req_risk, res_risk)
      type: array
      title: 风险规则过滤器

    reqRiskFilterTag:
      sql: req_risk
      type: array
      title: 请求风险规则过滤器

    resRiskFilterTag:
      sql: res_risk
      type: array
      title: 响应风险规则过滤器

    sensKeyFilterTag:
      sql: arrayConcat(req_sens_k, res_sens_k)
      type: array
      title: 敏感数据类型标签

    sensValFilterTag:
      sql: arrayConcat(req_sens_v, res_sens_v)
      type: array
      title: 敏感数据值过滤标签

    weakKey:
      sql: weak_k
      type: array
      title: 弱点名称

    customData:
      sql: data[indexOf(key, '{key}')]
      type: string
      title: 自定义数据

    hostUrl:
      sql: concat(host, multiIf(url_route != '', url_route, countSubstrings(url, '/') < 2, url, arrayStringConcat(arrayMap(x -> if(countMatches(x, '[0-9a-fA-F-]') > 0.8 * length(x), '{parameter}', x), splitByChar('/', url)), '/')))
      type: string
      title: 域名URL

    refer:
      sql: refer
      type: string
      title: Referer

    referPath:
      sql: path(refer)
      type: string
      title: 请求来源

    uaDev:
      sql: ua_info[1]
      type: string
      title: 设备型号

    uaVersion:
      sql: ua_info[3]
      type: string
      title: 终端版本

    uaFp:
      sql: ext_id[8]
      type: string
      title: UA指纹

    devData:
      sql: dev_data
      type: string
      title: 设备数据

    devRealIp:
      sql: JSONExtractString(dev_data, 'WebDeviceInfo', 'WebRTC', 1)
      type: string
      title: 设备真实IP

    devType:
      sql: multiIf(visitParamHas(dev_data,'AndroidDeviceInfo'),'Android',visitParamHas(dev_data,'IOSDeviceInfo'),'iOS',visitParamHas(dev_data,'WebDeviceInfo'),'H5',visitParamHas(dev_data,'WechatMpDeviceInfo'),'小程序',visitParamHas(dev_data,'HarmonyDeviceInfo'),'Harmony','')
      type: string
      title: 平台

    isProxy:
      sql: if(JSONExtractString(dev_data,'WebDeviceInfo','WebRTC',1)!='' and JSONExtractString(dev_data,'WebDeviceInfo','WebRTC',1)!=ip, '是', '否')
      type: string
      title: 是否使用代理

    isBot:
      sql: if(arraySum(x -> dictGetInt64('default.risk_dict','score',x), req_risk)!=0, 'bad', '')
      type: string
      title: 机器人

    uniqueId:
      sql: ext_id[7]
      type: string
      title: 应用标识

    customAppDesc:
      sql: dictGetString('default.custom_app_dict', 'desc', ext_id[7])
      type: string
      title: 应用描述

    appName:
      sql: multiIf(arrayExists(x -> position(assumeNotNull(url),'/')!=1 or startsWith(assumeNotNull(url),x[1]),dictGet('host_dict','info',assumeNotNull(host))),arrayFirst(x -> position(assumeNotNull(url),'/')!=1 or startsWith(assumeNotNull(url),x[1]),dictGet('host_dict','info',assumeNotNull(host)))[2],arrayExists(x -> startsWith(assumeNotNull(url),x[1]),dictGet('host_dict','info',splitByRegexp(':\\\\d+$',assumeNotNull(host))[1]||':*')),arrayFirst(x -> startsWith(assumeNotNull(url),x[1]),dictGet('host_dict','info',splitByRegexp(':\\\\d+$',assumeNotNull(host))[1]||':*'))[2],host)
      type: string
      title: 应用

    assetLevel:
      sql: if(url_action[4]='2','高危','一般')
      type: string
      title: 威胁等级

    assetType:
      sql: multiIf(url_action[2]='res','资源',url_action[2]='file','文件','API')
      type: string
      title: 业务类别

    urlActionName:
      sql: url_action[1]
      type: string
      title: URL类型

    ipGeoIsp:
      sql: ip_geo[4]
      type: string
      title: 运营商

    ipGeoOwner:
      sql: ip_geo[5]
      type: string
      title: 组织

    ipInfo:
      sql: dictGetString('default.ip_dict', 'info', ip)
      type: string
      title: IP情报

    deviceInfo:
      sql: dictGetString('default.device_dict', 'info', sid)
      type: string
      title: 设备情报

    resultLevel:
      sql: multiIf(multiIf(arrayExists(x -> dictGetInt64('default.risk_dict','score',x)=-100,req_risk),-100,notEmpty(req_risk),100-(100*arrayProduct(arrayMap(x -> 1-dictGetInt64('default.risk_dict','score',x)*0.01,req_risk))),0)>=80,'高风险',multiIf(arrayExists(x -> dictGetInt64('default.risk_dict','score',x)=-100,req_risk),-100,notEmpty(req_risk),100-(100*arrayProduct(arrayMap(x -> 1-dictGetInt64('default.risk_dict','score',x)*0.01,req_risk))),0)>=50,'中风险',multiIf(arrayExists(x -> dictGetInt64('default.risk_dict','score',x)=-100,req_risk),-100,notEmpty(req_risk),100-(100*arrayProduct(arrayMap(x -> 1-dictGetInt64('default.risk_dict','score',x)*0.01,req_risk))),0)>=20,'低风险','无风险')
      type: string
      title: 风险级别

    maskRule:
      sql: arrayFilter(x -> position(x,'脱敏')>0, res_risk)
      type: array
      title: 脱敏规则

    isSens:
      sql: multiIf(notEmpty(req_sens_k),'request',notEmpty(res_sens_k),'response','')
      type: string
      title: 是否含敏感数据

    isReqSens:
      sql: if(notEmpty(req_sens_k),'request','')
      type: string
      title: 请求含敏感数据

    isResSens:
      sql: if(notEmpty(res_sens_k),'response','')
      type: string
      title: 响应含敏感数据

    isApi:
      sql: url_action[2] = 'api'
      type: string
      title: 是否API

    isEncrypted:
      sql: if(JSONExtractString(file,'name')!='',JSONExtractString(file,'encrypt'),JSONExtractString(file,1,'encrypt'))
      type: string
      title: 是否加密

    isFile:
      sql: if(notEmpty(file),'file','')
      type: string
      title: 是否文件

    isFileSens:
      sql: if(notEmpty(if(JSONExtractString(file,'name')!='',res_sens_k,req_sens_k)),'sensFile','')
      type: string
      title: 是否敏感文件


    reqBody:
      sql: req_body
      type: string
      title: 请求Body

    respBody:
      sql: res_body
      type: string
      title: 响应Body


    reqSampleKey:
      sql: arraySlice(req_sens_k,1,1000)
      type: string
      title: 敏感数据名称采样(请求)

    respSampleKey:
      sql: arraySlice(res_sens_k,1,1000)
      type: string
      title: 敏感数据名称采样(响应)

    reqSampleValue:
      sql: arraySlice(req_sens_v,1,1000)
      type: string
      title: 敏感数据采样(请求)

    respSampleValue:
      sql: arraySlice(res_sens_v,1,1000)
      type: string
      title: 敏感数据采样(响应)

    resContentType:
      sql: content_type
      type: string
      title: 响应类型

    reqEncryptMethod:
      sql: splitByChar('|',ext_id[6])[1]
      type: string
      title: 请求加解密算法

    respEncryptMethod:
      sql: splitByChar('|',ext_id[6])[2]
      type: string
      title: 响应加解密算法

    sysProcessTime:
      sql: metric[1]
      type: number
      title: 系统处理时间

    upstreamProcessTime:
      sql: metric[2]
      type: number
      title: 上游处理时间

    tid:
      sql: ext_id[1]
      type: string
      title: 鉴权标识

    taskId:
      sql: task_id
      type: string
      title: 任务ID

    tokenPath:
      sql: ext_id[4]
      type: string
      title: 请求令牌

    analysis:
      sql: multiIf(result='protect','保护',result='failed','失败',result='pass','放行',result='success','成功','')
      type: string
      title: 结果分析

    srcNode:
      sql: if(position(data[3],']')!=0,regexpExtract(data[3],'\\[(.*)\\]',1),splitByChar(':',data[3])[1])
      type: string
      title: 源节点地址

    dstPort:
      sql: if(countSubstrings(upstream,':')=0 OR position(splitByChar(':',upstream)[-1],']')>0,'80',splitByChar(':',upstream)[-1])
      type: string
      title: 目标节点端口

    weakVal:
      sql: weak_v
      type: string
      title: 弱点

    risk:
      sql: arrayJoin(arrayFilter(x -> dictGetInt64('default.risk_dict','score',x)!=0,req_risk))
      type: string
      title: 风险规则

    # 敏感数据综合展开 (arrayJoin of req+res sens key/val/privacy/score)
    # sensCombineExtList: [(key, val, privacyLevel, score), ...]，过滤掉 privacy 为空的项
    # sensCombineExt: arrayJoin 展开为单行 tuple
    sensKeyCombineExt:
