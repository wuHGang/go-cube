cube:
  name: ApiView
  sql: |
    SELECT org,
           url,
           method,
           multiIf(arrayExists(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', assumeNotNull(host))),
                   arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]),
                              dictGet(host_dict, 'info', assumeNotNull(host)))[2],
                   arrayExists(x -> startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', splitByRegexp(':\\d+$', assumeNotNull(host))[1] || ':*')),
                   arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info',
                                                                                 splitByRegexp(':\\d+$', assumeNotNull(host))[1] || ':*'))[2],
                   host)          as app_name,
           argMax(host, ts)       as last_host,
           groupUniqArray(host)   as host_list,
           max(ts)                as max_ts,
           min(first_ts)          as first_ts,
           argMax(url_action, ts) as url_action,
           argMax(channel, ts)    as channel,
           sum(count) AS count, 
           argMax(conf_tag, ts) as conf_tag, 
           argMax(type, ts) as type, 
           coalesce(argMaxIf(mgt_status, ts, mgt_status!=''), '') as mgt_status, 
           argMax(importance, ts) as importance, 
           argMax(biz_analysis, ts) as biz_analysis, 
           argMax(param_analysis, ts) as param_analysis, 
           argMax(source, ts) as source,
           groupUniqArray((req_key, final_view.first_ts)) as req_key_first_ts_tuple_array,
           max(final_view.first_ts) as current_req_key_ts,
           sumMap(hour_count) as hour_count,
           sumMap(risk_count) as risk_count,
           sumMap(weak_count) as weak_count,
           sumMap(metric_count) as metric_count,
           uniqMapMerge(req_sens_uniq) as req_sens_uniq_map,
           uniqMapMerge(res_sens_uniq) as res_sens_uniq_map
    FROM (
      select coalesce (org, '') as org, coalesce (ts, toDateTime(0)) as ts, coalesce (first_ts, toDateTime(0)) as first_ts, url, req_key,
      coalesce (a.host, b.host) as host, method, url_action, channel, coalesce (count, 0) as count, type, source,
      conf_tag, mgt_status, importance, biz_analysis, param_analysis, hour_count, risk_count,
      weak_count, metric_count, req_sens_uniq, res_sens_uniq
      from (
      SELECT org, ts, first_ts, url, req_key, host, method, url_action, channel, count, type, source,
      hour_count, risk_count, weak_count, metric_count, req_sens_uniq, res_sens_uniq
      FROM default.access_sample_raw
      WHERE {filter.ts}
      ) AS a
      FULL OUTER JOIN
      (
      SELECT id, host, mgt_status, importance, biz_analysis, param_analysis, method, path as url,
      arrayMap(x -> dictGetString('api_tag_dict', 'name', x), tag_ids) AS conf_tag, importance_analysis, param_analysis
      FROM api_dict
      ) as b
      USING (host, method, url)
      ) as final_view
    GROUP BY org, app_name, method, url

  segments:
    org:
      sql: org = {vars.org}

    # 每天至少访问1次的API，或手工导入的API
    onePerDay:
      sql: ((count > (today() - toDate(first_ts))) or channel = '手工导入')

    # 未被忽略的API：存在管理状态 或 未被黑名单过滤配置忽略
    black:
      sql: (notEmpty(mgt_status) or arrayAll(x -> concat(x, url) NOT IN ({vars.api_exact}) AND NOT multiMatchAny(concat(x, url), [{vars.api_regex}]), host_list))

  dimensions:
    id:
      sql: cityHash64(method, app_name, url)
      type: string
      title: API指纹

    api:
      sql: method || ' ' || app_name || url
      type: string
      primary_key: true
      title: API

    urlRoute:
      sql: url
      type: string
      title: URL路由

    host:
      sql: last_host
      type: string
      title: 域名

    method:
      sql: method
      type: string
      title: 请求方式

    appName:
      sql: app_name
      type: string
      title: 应用

    channel:
      sql: if(channel is NULL, '手工导入', channel)
      type: string
      title: 站点

    count:
      sql: arraySum(hour_count.2)
      type: number
      title: 访问量

    ts:
      sql: if(max_ts=toDateTime(0), now(), max_ts)
      type: time
      title: 时间

    firstTs:
      sql: if(first_ts=toDateTime(0), now(), first_ts)
      type: time
      title: 首次访问

    appId:
      sql: multiIf(notEmpty(dictGet('host_dict', 'info', assumeNotNull(last_host))), arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', assumeNotNull(last_host)))[3], notEmpty(dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*')), arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*'))[3], '')
      type: string
      title: 应用ID

    dctSection:
      sql: dictGetString('app_dict', 'department', multiIf(notEmpty(dictGet('host_dict', 'info', assumeNotNull(last_host))), arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', assumeNotNull(last_host)))[3], notEmpty(dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*')), arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*'))[3], ''))
      type: string
      title: 应用部门

    isFavorite:
      sql: if((select count() from postgres.configs where (type = 'appName_filter' or type = 'appName_filter_regex') and name = 'favorite_app' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) < 1, 0, app_name in (select JSONExtractString(config, 'appName') from postgres.configs where type = 'appName_filter' and name = 'favorite_app' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) or multiMatchAny(app_name, (select groupArray(JSONExtractString(config, 'appName')) from postgres.configs where type = 'appName_filter_regex' and name = 'favorite_app' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now()))))))
      type: number
      title: 已关注

    topoNetwork:
      sql: url_action[5]
      type: string
      title: 网络类型

    netDomainName:
      sql: if(url_action[7] != '', splitByChar('(', url_action[7])[1], '')
      type: string
      title: 网络域名称

    apiTypeTag:
      sql: multiIf(notEmpty(arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6])))), 'API', url_action[2] = 'res', '资源', url_action[2] = 'file', '文件', 'API')
      type: string
      title: API类型标签

    sidebarType:
      sql: arrayStringConcat(arrayFilter(x->x!='',arrayConcat(multiIf(mgt_status = '' AND if((select count() from postgres.configs where (type = 'api_filter' or type = 'api_filter_regex') and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) < 1, 0, concat(last_host, url) in (select JSONExtractString(config, 'api') from postgres.configs where type = 'api_filter' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) or multiMatchAny(concat(last_host, url), (select groupArray(JSONExtractString(config, 'api')) from postgres.configs where type = 'api_filter_regex' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))))), ['已梳理->始终忽略'],mgt_status='下线',['已梳理->下线'],mgt_status='已确认',['已梳理->已确认'], arrayConcat([if(multiIf(mgt_status='下线', '下线', first_ts > (toStartOfDay(now()) - (3600 * 24) * 1), '新上线', '')='新上线','已发现->新上线', ''), if(length(arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1)) > 1 and current_req_key_ts > toStartOfDay(now()) - (3600 * 24 * 1), '已发现->参数变化', ''), if(multiIf(mgt_status='下线', '下线', max_ts > (toStartOfDay(now()) - ((3600 * 24) * 7)), '活跃', '失活')='活跃','已发现->活跃', '已发现->失活')])), [if(multiIf(importance!='', importance, '')!='', '资产价值'||'->'||multiIf(importance!='', importance, ''), ''), if(app_name!=last_host, '已梳理应用'||'->'||app_name, '')],arrayMap(x->if(position(x, '第三方组件-')>0 or position(x, '认证方式-')>0 or position(x, '鉴权-')>0, replaceOne(x, '-', '->'), '功能'||'->'||x),if(url_action[6]!='', splitByChar(',', url_action[6]), [])))), ',')
      type: string
      title: API类型

    filtered:
      sql: mgt_status = '' AND if((select count() from postgres.configs where (type = 'api_filter' or type = 'api_filter_regex') and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) < 1, 0, concat(last_host, url) in (select JSONExtractString(config, 'api') from postgres.configs where type = 'api_filter' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) or multiMatchAny(concat(last_host, url), (select groupArray(JSONExtractString(config, 'api')) from postgres.configs where type = 'api_filter_regex' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now()))))))
      type: number
      title: 是否被过滤

    reqKeyTupleArray:
      sql: req_key_first_ts_tuple_array
      type: string

    reqKeySet:
      sql: arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1)
      type: string

    currentReqKeyTs:
      sql: current_req_key_ts
      type: time

    customRuleTag:
      sql: multiIf(url_action[6]!='', splitByChar(',', url_action[6]), if(url_action[2]='api' OR url_action[2]='auto', url_action[1], '')!='', [if(url_action[2]='api' OR url_action[2]='auto', url_action[1], '')], [])
      type: array
      title: 功能

    configTag:
      sql: conf_tag
      type: array
      title: 标签

    managementStatus:
      sql: mgt_status
      type: string
      title: 管理状态

    autoBizName:
      sql: if(url_action[2]='api' OR url_action[2]='auto', url_action[1], '')
      type: string
      title: 业务自动名称

    bizName:
      sql: multiIf(url_action[3]!='', url_action[3], url_action[2]='api' OR url_action[2]='auto', url_action[1], '')
      type: string
      title: 业务名称

    bizAIAnalysis:
      sql: if(startsWith(biz_analysis, 'AI分析'), biz_analysis, '')
      type: string
      title: AI业务分析

    director:
      sql: dictGetString('app_dict', 'director', multiIf(notEmpty(dictGet('host_dict', 'info', assumeNotNull(last_host))), arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', assumeNotNull(last_host)))[3], notEmpty(dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*')), arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*'))[3], ''))
      type: string
      title: 应用负责人

    riskKeyScoreTuple:
      sql: arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('risk_dict','score',x.1)), arrayFilter(x -> dictGetInt64('risk_dict','score',x.1)>0, arrayZip(risk_count.1, risk_count.2))))
      type: array

    weakKeyScoreTuple:
      sql: arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('weak_dict','score',x.1)), arrayFilter(x -> dictGetInt64('weak_dict','score',x.1)>0, arrayZip(weak_count.1, weak_count.2))))
      type: array

    currentReqKey:
      sql: multiIf(length((arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[1])=0, '-', length(arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))<2, arrayStringConcat(arrayMap(x->'[=]'||x,(arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[1]), ','), arrayStringConcat(arraySort(x-> multiIf(position(x,'=')>0, 3, position(x,'+') > 0, 1, 2), arrayMap(x -> multiIf(has((arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[1], x) AND has((arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[2], x), '[=]' || x, has((arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[1], x), '[+]' || x, '[-]' || x), arrayDistinct(arrayConcat((arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[1], (arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1))[2])))), ','))
      type: string

    resSensScoreTupleRaw:
      sql: if(notEmpty(mapKeys(res_sens_uniq_map)), arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('default.privacy_dict','score',x.1)), arrayZip(mapKeys(res_sens_uniq_map), mapValues(res_sens_uniq_map)))), [])
      type: array
      title: 响应隐私及分数

    reqSensScoreTupleRaw:
      sql: if(notEmpty(mapKeys(req_sens_uniq_map)), arraySort(x -> (-x.2,x.1), arrayMap(x -> (format('{}({})', x.1, toString(x.2)), dictGetInt64('default.privacy_dict','score',x.1)), arrayZip(mapKeys(req_sens_uniq_map), mapValues(req_sens_uniq_map)))), [])
      type: array
      title: 请求隐私及分数

    bizImportance:
      sql: multiIf(importance!='', importance, '')
      type: string
      title: 资产价值

    activeTag:
      sql: multiIf(mgt_status='下线', '下线', max_ts > (toStartOfDay(now()) - ((3600 * 24) * 7)), '活跃', '失活')
      type: string

    newApiTag:
      sql: multiIf(mgt_status='下线', '下线', first_ts > (toStartOfDay(now()) - (3600 * 24) * 1), '新上线', '')
      type: string

    sidebarTypeArray:
      sql: arrayFilter(x->x!='',arrayConcat(multiIf(mgt_status = '' AND if((select count() from postgres.configs where (type = 'api_filter' or type = 'api_filter_regex') and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) < 1, 0, concat(last_host, url) in (select JSONExtractString(config, 'api') from postgres.configs where type = 'api_filter' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) or multiMatchAny(concat(last_host, url), (select groupArray(JSONExtractString(config, 'api')) from postgres.configs where type = 'api_filter_regex' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))))), ['已梳理->始终忽略'],mgt_status='下线',['已梳理->下线'],mgt_status='已确认',['已梳理->已确认'], arrayConcat([if(multiIf(mgt_status='下线', '下线', first_ts > (toStartOfDay(now()) - (3600 * 24) * 1), '新上线', '')='新上线','已发现->新上线', ''), if(length(arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1)) > 1 and current_req_key_ts > toStartOfDay(now()) - (3600 * 24 * 1), '已发现->参数变化', ''), if(multiIf(mgt_status='下线', '下线', max_ts > (toStartOfDay(now()) - ((3600 * 24) * 7)), '活跃', '失活')='活跃','已发现->活跃', '已发现->失活')])), [if(multiIf(importance!='', importance, '')!='', '资产价值'||'->'||multiIf(importance!='', importance, ''), ''), if(app_name!=last_host, '已梳理应用'||'->'||app_name, '')],arrayMap(x->if(position(x, '第三方组件-')>0 or position(x, '认证方式-')>0 or position(x, '鉴权-')>0, replaceOne(x, '-', '->'), '功能'||'->'||x),multiIf(url_action[6]!='', splitByChar(',', url_action[6]), []))))
      type: string

    sidebarFirstLevelTypeArray:
      sql: arrayDistinct(arrayMap(x->splitByString('->', assumeNotNull(x))[1], arrayFilter(x->x!='',arrayConcat(multiIf(mgt_status = '' AND if((select count() from postgres.configs where (type = 'api_filter' or type = 'api_filter_regex') and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) < 1, 0, concat(last_host, url) in (select JSONExtractString(config, 'api') from postgres.configs where type = 'api_filter' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))) or multiMatchAny(concat(last_host, url), (select groupArray(JSONExtractString(config, 'api')) from postgres.configs where type = 'api_filter_regex' and name = 'black' and coalesce(org_id, '') = '' and (JSONExtractString(config, 'view') = 'ApiView' or JSONExtractString(config, 'view') = 'All') and (empty(JSONExtractString(config, 'expireTime')) OR JSONExtractString(config, 'expireTime') > toString(toUnixTimestamp(now())))))), ['已梳理->始终忽略'],mgt_status='下线',['已梳理->下线'],mgt_status='已确认',['已梳理->已确认'], arrayConcat([if(multiIf(mgt_status='下线', '下线', first_ts > (toStartOfDay(now()) - (3600 * 24) * 1), '新上线', '')='新上线','已发现->新上线', ''), if(length(arrayDistinct(arrayReverseSort(x -> x.2, req_key_first_ts_tuple_array).1)) > 1 and current_req_key_ts > toStartOfDay(now()) - (3600 * 24 * 1), '已发现->参数变化', ''), if(multiIf(mgt_status='下线', '下线', max_ts > (toStartOfDay(now()) - ((3600 * 24) * 7)), '活跃', '失活')='活跃','已发现->活跃', '已发现->失活')])), [if(multiIf(importance!='', importance, '')!='', '资产价值'||'->'||multiIf(importance!='', importance, ''), ''), if(app_name!=last_host, '已梳理应用'||'->'||app_name, '')],arrayMap(x->if(position(x, '第三方组件-')>0 or position(x, '认证方式-')>0 or position(x, '鉴权-')>0, replaceOne(x, '-', '->'), '功能'||'->'||x),if(url_action[6]!='', splitByChar(',', url_action[6]), []))))))
      type: string

    staticTagExt:
      sql: arrayJoin(if(url_action[2] IN ('api','auto') AND notEmpty(url_action[1]), [url_action[1]], ['未分组']))
      type: string
      title: 智能分组标签

    autoTagExt:
      sql: "arrayJoin(arrayZip(if(notEmpty(conf_tag) OR url_action[6] != '', arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6]))), if(url_action[2] IN ('api','auto') AND url_action[1] != '', [url_action[1]], ['未分组'])), if(notEmpty(conf_tag) OR url_action[6] != '', arrayConcat(arrayMap(x->1, arrayFilter(x->notEmpty(x), conf_tag)), arrayMap(x->2, arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6])))), arrayMap(x->3, if(url_action[2] IN ('api','auto') AND url_action[1] != '', [url_action[1]], ['未分组']))))).1"
      type: string
      title: 自动分组标签

    autoTagTypeExt:
      sql: "arrayJoin(arrayZip(if(notEmpty(conf_tag) OR url_action[6] != '', arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6]))), if(url_action[2] IN ('api','auto') AND url_action[1] != '', [url_action[1]], ['未分组'])), if(notEmpty(conf_tag) OR url_action[6] != '', arrayConcat(arrayMap(x->1, arrayFilter(x->notEmpty(x), conf_tag)), arrayMap(x->2, arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6])))), arrayMap(x->3, if(url_action[2] IN ('api','auto') AND url_action[1] != '', [url_action[1]], ['未分组']))))).2"
      type: string
      title: 自动分组标签类型

    isApi:
      sql: "if(multiIf(notEmpty(arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6])))), 'API', url_action[2] = 'res', '资源', url_action[2] = 'file', '文件', 'API') = 'API', '1', '0')"
      type: string
      title: 是否API

    metricMap:
      sql: mapFromArrays(metric_count.1, metric_count.2)
      type: string

    dayCount:
      sql: "(mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail'])"
      type: number
      title: 今日访问量

    successCount:
      sql: "mapFromArrays(metric_count.1, metric_count.2)['success']"
      type: number

    success:
      sql: "round(100 * (mapFromArrays(metric_count.1, metric_count.2)['success']) / nullIf((mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail']), 0), 2)"
      type: number
      title: 成功率

    hourCount:
      sql: mapFilter((k, v) -> k >= today(), mapFromArrays(hour_count.1, hour_count.2))
      type: number
      title: 今日访问趋势

    weakCount:
      sql: weak_count
      type: number

    todayWeakNum:
      sql: arraySum(weak_count.2)
      type: number
      title: 今日弱点总数

    respSensKey:
      sql: mapKeys(res_sens_uniq_map)
      type: array

    reqSensKey:
      sql: mapKeys(req_sens_uniq_map)
      type: array

    sensKey:
      sql: if(url_action[5] != '外发', mapKeys(res_sens_uniq_map), mapKeys(req_sens_uniq_map))
      type: array
      title: 敏感项

    tag:
      sql: toString(arrayFilter(x -> assumeNotNull(x) != '', [multiIf(mgt_status='下线', '下线', max_ts > (toStartOfDay(now()) - ((3600 * 24) * 7)), '活跃', '失活'), multiIf(mgt_status='下线', '下线', first_ts > (toStartOfDay(now()) - (3600 * 24) * 1), '新上线', ''), multiIf(notEmpty(arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6])))), 'API', url_action[2] = 'res', '资源', url_action[2] = 'file', '文件', 'API'), if(type='HTTP2/gRPC', 'gRPC', type)]))
      type: string
      title: 属性

    autoTag:
      sql: if(notEmpty(conf_tag) OR notEmpty(url_action[6]), arrayConcat(arrayFilter(x->notEmpty(x), conf_tag), arrayFilter(x->notEmpty(x), splitByChar(',', url_action[6]))), if(url_action[2] IN ('api','auto') AND url_action[1] != '', [url_action[1]], ['未分组']))
      type: array
      title: 自动分组标签集合

    sensScore:
      sql: if(url_action[5] != '外发', if(notEmpty(mapKeys(res_sens_uniq_map)),100-100*arrayProduct(arrayMap(x -> 1-0.01*dictGetInt64('default.privacy_dict','score',x),mapKeys(res_sens_uniq_map))),0), if(notEmpty(mapKeys(req_sens_uniq_map)),100-100*arrayProduct(arrayMap(x -> 1-0.01*dictGetInt64('default.privacy_dict','score',x),mapKeys(req_sens_uniq_map))),0))
      type: number
      title: 敏感分

    weakScore:
      sql: round(if(notEmpty(weak_count.1),100-100*arrayProduct(arrayMap(x-> 1 - (dictGetInt64('default.weak_dict', 'score', x) / 100), weak_count.1)), 0),2)
      type: number
      title: 弱点评分

    riskScore:
      sql: round(if(notEmpty(risk_count.1),100-100*arrayProduct(arrayMap(x -> 1-0.01*dictGetInt64('default.risk_dict','score',x),risk_count.1)),0),2)
      type: number
      title: 风险评分

    respSensTagSet:
      sql: arrayStringConcat(mapKeys(res_sens_uniq_map), ', ')
      type: string
      title: 涉敏信息

    timeSum:
      sql: mapFromArrays(metric_count.1, metric_count.2)['time']
      type: number

    lengthSum:
      sql: mapFromArrays(metric_count.1, metric_count.2)['length']
      type: number

    timeAvg:
      sql: round((mapFromArrays(metric_count.1, metric_count.2)['time'])/nullIf((mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail']), 0)/1000, 2)
      type: number
      title: 平均访问时间

    lengthAvg:
      sql: round((mapFromArrays(metric_count.1, metric_count.2)['length'])/nullIf((mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail']), 0), 2)
      type: number
      title: 平均响应大小

    hostUrl:
      sql: last_host || url
      type: string
      title: 地址

    description:
      sql: dictGetString('app_dict','description', multiIf(notEmpty(dictGet('host_dict', 'info', assumeNotNull(last_host))), arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', assumeNotNull(last_host)))[3], notEmpty(dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*')), arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet('host_dict', 'info', splitByRegexp(':\\d+$', assumeNotNull(last_host))[1] || ':*'))[3], ''))
      type: string
      title: 备注

    # 传输协议: HTTP, HTTP2, WebSocket, MQTT
    protocol:
      sql: multiIf(match(type,'HTTP2'), 'HTTP2', position(method,'|')>0, substringIndex(method,'|',1), 'HTTP')
      type: string
      title: 协议

    authParamPath:
      sql: url_action[8]
      type: string
      title: 鉴权参数

    urlPath:
      sql: URLPathHierarchy(concat('http://x', assumeNotNull(url)))
      type: array
      title: 路径

  measures:
    sum:
      sql: sum(count)
      type: number
      title: API访问量
    allCount:
      sql: uniqExact(method, app_name, url)
      type: number
      title: 总数
    allCountForList:
      sql: count()
      type: number
      title: 总数-分页
    appCount:
      sql: uniqExact(app_name)
      type: number
      title: 应用数
    sensAppCount:
      sql: uniqExactIf(app_name, length(mapKeys(res_sens_uniq_map)) > 0)
      type: number
      title: 响应含隐私应用数
    weakAppCount:
      sql: uniqExactIf(app_name, arraySum(weak_count.2) > 0)
      type: number
      title: 弱点应用数

    uniqApiCount:
      sql: uniqExactIf(method, app_name, url, url_action[2] != 'res' and url_action[2] != 'file')
      type: number
      title: API数

    uniqWeakApiCount:
      sql: uniqExactIf(method, app_name, url, arraySum(weak_count.2) > 0 and url_action[2] != 'res' and url_action[2] != 'file')
      type: number
      title: 弱点API数

    uniqApiRespSensCount:
      sql: uniqExactIf(method, app_name, url, length(mapKeys(res_sens_uniq_map)) > 0 and url_action[2] != 'res' and url_action[2] != 'file')
      type: number
      title: 响应涉敏API数

    hourCountArray:
      sql: sumMap(hour_count)
      type: number
      title: 今日小时趋势

    daySum:
      sql: sum((mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail']))
      type: number
      title: 今日访问量

    successSum:
      sql: round(100 * sum(mapFromArrays(metric_count.1, metric_count.2)['success']) / nullIf(sum((mapFromArrays(metric_count.1, metric_count.2)['success']) + (mapFromArrays(metric_count.1, metric_count.2)['fail'])), 0), 2)
      type: number
      title: 聚合成功率

    hostSet:
      sql: groupUniqArrayArray(host_list)
      type: string
      title: 域名举例

    autoTopoNetwork:
      sql: anyHeavy(url_action[5])
      type: string
      title: 网络类型

    aggSensScore:
      sql: if(notEmpty(groupUniqArrayArray(if(url_action[5] != '外发', mapKeys(res_sens_uniq_map), mapKeys(req_sens_uniq_map)))), floor(100 - 100 * arrayProduct(arrayMap(x -> 1 - 0.01 * dictGetInt64('default.privacy_dict', 'score', x), groupUniqArrayArray(if(url_action[5] != '外发', mapKeys(res_sens_uniq_map), mapKeys(req_sens_uniq_map))))), 2), 0)
      type: number
      title: 聚合敏感分

    autoTitleSetStr:
      sql: arrayStringConcat(groupUniqArrayIf(url_action[1], url_action[2] = 'auto' and notEmpty(url_action[1]) and url = '/'), '->')
      type: string
      title: 应用智能标签

    autoLogo:
      sql: anyIf(url_action[1], url_action[2] = 'logo')
      type: string
      title: 应用LOGO

    customRuleTagSet:
      sql: groupUniqArrayArray(multiIf(url_action[6]!='', splitByChar(',', url_action[6]), if(url_action[2]='api' OR url_action[2]='auto', url_action[1], '')!='', [if(url_action[2]='api' OR url_action[2]='auto', url_action[1], '')], []))
      type: string
      title: 功能集合

    configTagSet:
      sql: groupUniqArrayArray(conf_tag)
      type: string
      title: 配置标签集合

